# Конфигурация Alembic.
# URL базы данных НЕ хранится здесь: он берётся из настроек приложения (.env)
# внутри backend/alembic/env.py. Так секреты не попадают в репозиторий.

[alembic]
script_location = backend/alembic
prepend_sys_path = backend
# Шаблон имени файла миграции: 0001_describe_change.py
file_template = %%(rev)s_%%(slug)s
# Часовой пояс для Create Date в миграциях.
timezone = UTC
# sqlalchemy.url задаётся программно в env.py (из get_settings().database_url).
sqlalchemy.url =

[post_write_hooks]
# Хуки автоформатирования отключены (форматируем через make format).

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
